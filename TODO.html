<h1 id="action-items">Action Items</h1>
<h2 id="bugs">Bugs</h2>
<h2 id="next-steps-upcoming-features-v0.0.5">Next Steps (upcoming
features, v0.0.5)</h2>
<ul class="task-list">
<li><p><label><input type="checkbox" />PDF extraction — shared internal
<code>pdfExtract(file, pages)</code> function used by both commands
below. Uses three poppler utilities in sequence: 1. <code>pdfinfo</code>
— metadata (title, author, page count, creation date) 2.
<code>pdftotext -layout</code> — text extraction preserving spatial
structure (prose, code, tables) 3. <code>pdfimages -list</code> — detect
pages with raster images; flag sparse/empty pages that are likely vector
diagrams so output isn’t silently incomplete Vector diagrams
(path-command graphics) cannot be extracted by any text tool — those
pages should be flagged for follow-up with a vision-capable route.
Poppler (pdftotext, pdfinfo, pdfimages) is the chosen backend;
LibreOffice and Pandoc are not suitable for PDF input.</label></p></li>
<li><p><label><input
type="checkbox" /><code>/read_pdf FILE [PAGES]</code> slash command —
context injection path. Calls <code>pdfExtract</code> with an optional
page range (e.g. <code>40-55</code>). Enforces a page cap (~20 pages) to
stay within context window limits. Output is injected into the
conversation as a user message so the model can reason about the content
immediately. Ephemeral — not stored anywhere. Example:
<code>/read_pdf ~/docs/oberon2.pdf 49-63</code></label></p></li>
<li><p><label><input type="checkbox" /><code>/rag ingest FILE.pdf</code>
subcommand — RAG ingestion path. Calls <code>pdfExtract</code> on the
full document (no page cap), chunks the output by paragraph/section,
attaches per-chunk metadata (source file, page number, document title
from pdfinfo), embeds, and stores in the active RAG store. Pages flagged
as diagram-heavy by pdfimages are stored with an incomplete-content
marker so retrieval results can surface the caveat. Companion to
<code>/read_pdf</code>; both share <code>pdfExtract</code> but serve
different outputs (chat context vs. RAG database).</label></p></li>
<li><p><label><input type="checkbox" />Attached file support —
<code>/attach FILE</code> command that includes a file as multimodal
content in the next chat turn. For cloud routes with
CompletionPDF/CompletionImage support (Anthropic, Mistral, Gemini),
sends the raw file bytes as a ContentPart so the model processes it
natively. For local/text-only models, falls back to text extraction. See
conversation notes for design details.</label></p></li>
</ul>
